<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zigporter — Interactive Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:  #0d1117; --bg2: #161b22; --bg3: #21262d;
  --bdr: #30363d; --txt: #e6edf3; --dim: #8b949e;
  --grn: #4fd1c5; --cyn: #79c0ff; --yel: #e3b341;
  --red: #f85149; --pur: #bc8cff; --blu: #58a6ff;
  /* --grn matches Rich's [green]/[cyan bold] as rendered by the real terminal theme */
  --tbg: #010409; --ttx: #cdd9e5;
  --font: 'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
}
body { background:var(--bg); color:var(--txt); font-family:var(--font);
       height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ──────────────────────────────────────────────── */
.hdr { background:var(--bg2); border-bottom:1px solid var(--bdr);
       padding:10px 16px; display:flex; align-items:center; gap:12px;
       flex-shrink:0; font-size:12px; }
.tls { display:flex; gap:6px; }
.tl  { width:12px; height:12px; border-radius:50%; }
.tlr { background:#ff5f57; } .tly { background:#febc2e; } .tlg { background:#28c840; }
.hdr-t { color:var(--dim); }
.hdr-t strong { color:var(--cyn); }
#vbadge { color:var(--grn); margin:0 2px; }

/* ── Layout ──────────────────────────────────────────────── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── Terminal ────────────────────────────────────────────── */
.term { flex:1; background:var(--tbg); display:flex;
        flex-direction:column; overflow:hidden; min-width:0; }
.tbar { background:var(--bg3); border-bottom:1px solid var(--bdr);
        padding:5px 12px; font-size:11px; color:var(--dim);
        display:flex; align-items:center; gap:8px; }
.tout { flex:1; overflow-y:auto; overflow-x:hidden; padding:14px 18px;
        font-size:12.5px; line-height:1.75; color:var(--ttx);
        white-space:pre; }
.tout::-webkit-scrollbar { width:5px; }
.tout::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:3px; }

/* inline colour helpers */
.g { color:var(--grn); } .c { color:var(--cyn); } .y { color:var(--yel); }
.r { color:var(--red); } .d { color:var(--dim); } .w { color:#ffffff; font-weight:700; }
.p { color:var(--pur); } .b { color:var(--blu); }
.hd { color:var(--grn); font-weight:700; }  /* [bold cyan] in Rich → same teal as [green] */
.ok { color:var(--grn); font-weight:700; }
.ps { color:var(--grn); }
.cmd { color:var(--cyn); font-weight:600; }
.bd { font-weight:700; }
/* blinking cursor */
.cur { display:inline-block; width:7px; height:13px;
       background:var(--ttx); vertical-align:text-bottom;
       animation:blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Sidebar ─────────────────────────────────────────────── */
.side { width:262px; flex-shrink:0; background:var(--bg2);
        border-left:1px solid var(--bdr); display:flex;
        flex-direction:column; overflow:hidden; }
.stitle { background:var(--bg3); border-bottom:1px solid var(--bdr);
          padding:6px 14px; font-size:10.5px; color:var(--dim);
          letter-spacing:.6px; text-transform:uppercase; }
.sbody { flex:1; overflow-y:auto; padding:10px; }
.sbody::-webkit-scrollbar { width:4px; }
.sbody::-webkit-scrollbar-thumb { background:var(--bg3); }

.card { border:1px solid var(--bdr); border-radius:6px;
        padding:10px 12px; margin-bottom:8px; cursor:pointer;
        background:var(--bg3); transition:border-color .15s, background .15s; }
.card:hover  { border-color:var(--cyn); background:rgba(121,192,255,.05); }
.card.active { border-color:var(--cyn); background:rgba(121,192,255,.08); }
.card .cc    { font-size:12px; font-weight:600; color:var(--cyn); }
.card .cc .cps { color:var(--grn); font-weight:400; }
.card .cd    { font-size:11px; color:var(--dim); margin-top:3px; line-height:1.4; }
.card .cs    { font-size:10px; margin-top:6px; color:var(--dim); }
.card.active .cs { color:var(--cyn); }
.card.done   .cs { color:var(--grn); }
.card.done       { border-color:rgba(63,185,80,.4); }

.sfoot { padding:10px; border-top:1px solid var(--bdr); }
.breplay { width:100%; font-family:var(--font); font-size:11.5px;
           padding:7px; border-radius:5px; border:1px solid var(--bdr);
           background:var(--bg3); color:var(--dim); cursor:pointer;
           transition:color .15s, border-color .15s; }
.breplay:hover { color:var(--txt); border-color:var(--dim); }

@media (max-width:640px) {
  .main { flex-direction:column; }
  .side { width:100%; height:180px; border-left:none; border-top:1px solid var(--bdr); }
  .sbody { display:flex; gap:8px; overflow-x:auto; overflow-y:hidden; padding:8px; }
  .card  { flex-shrink:0; min-width:148px; margin-bottom:0; }
  .sfoot { padding-top:6px; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="tls">
    <div class="tl tlr"></div><div class="tl tly"></div><div class="tl tlg"></div>
  </div>
  <div class="hdr-t">
    <strong>zigporter</strong> <span id="vbadge">(dev)</span> — interactive demo
  </div>
</div>

<div class="main">
  <div class="term">
    <div class="tbar"><span class="g">●</span> <span>zsh — zigporter</span></div>
    <div class="tout" id="tout"></div>
  </div>
  <div class="side">
    <div class="stitle">Commands</div>
    <div class="sbody" id="sbody"></div>
    <div class="sfoot"><button class="breplay" id="breplay">↺  Replay</button></div>
  </div>
</div>

<script>
// ── HTML helpers ──────────────────────────────────────────────────────────────
const G = (cls, t) => `<span class="${cls}">${t}</span>`;
const d = (t) => G('d', t);
const g = (t) => G('g', t);
const c = (t) => G('c', t);
const y = (t) => G('y', t);
const r = (t) => G('r', t);
const w = (t) => G('w', t);
const b = (t) => G('b', t);
const p = (t) => G('p', t);
const hd = (t) => G('hd', t);
const ok = (t) => G('ok', t);
const bd = (t) => G('bd', t);

function rule(title, width) {
  width = width || 70;
  if (!title) return d('─'.repeat(width));
  const inner = ` ${title} `;
  const half = Math.max(0, (width - inner.length) / 2);
  return d('─'.repeat(Math.floor(half))) + inner + d('─'.repeat(Math.ceil(half)));
}

// questionary renders confirmed answer as: ? Question? Yes  (answer in green, no (y/n) hint)
function qline(q, ans) {
  return `${c('?')} ${q} ${g(ans)}`;
}

// questionary press_any_key_to_continue renders as plain dim text
function enterLine(msg) {
  return d(msg);
}

function stepHead(n, title) {
  return hd(`[${n}/8] ${title}`);
}

// ── Line entry format ─────────────────────────────────────────────────────────
// [html, delay_ms]          normal line appended after delay
// [html, delay_ms, 1]       spinner: append on first, overwrite on subsequent
// [null, delay_ms]          blank line
// [html, delay_ms, 2]       replaces the active spinner with a normal line

// ── DEMO: check ──────────────────────────────────────────────────────────────
const DEMO_CHECK = [
  [`<span class="ps">$</span> <span class="cmd">zigporter check</span>`, 0],
  [null, 300],
  [rule('Pre-flight checks', 70), 200],
  [null, 60],
  [`  ${ok('✓')}  ${bd('Configuration')}       HA_URL, HA_TOKEN, Z2M_URL are set`, 300],
  [`  ${ok('✓')}  ${bd('HA reachable')}         homeassistant.local:8123`, 300],
  [`  ${ok('✓')}  ${bd('ZHA active')}           5 device(s) found`, 400],
  [`  ${ok('✓')}  ${bd('Z2M running')}          0 device(s) paired`, 400],
  [null, 80],
  [rule('', 70), 100],
];

// ── DEMO: list-z2m ────────────────────────────────────────────────────────────
const DEMO_LISTZ2M = [
  [`<span class="ps">$</span> <span class="cmd">zigporter list-z2m</span>`, 0],
  [`${d('⠸')} Fetching Zigbee2MQTT devices...`, 400, 1],
  [`${d('⠼')} Fetching Zigbee2MQTT devices...`, 500, 1],
  [`${d('⠴')} Fetching Zigbee2MQTT devices...`, 400, 1],
  [`${d('⠦')} Done`, 300, 2],
  [null, 200],
  // Title
  [d('                    ') + bd('Zigbee2MQTT Devices (5)'), 100],
  // Table header
  [d('┏━━━━━━━━━━━━━━━━━━━━━━━┳━━━━━━━━━━━━━━━━━━━━━━┳━━━━━━━━━━━┳━━━━━━━━━━━━━━━━━┓'), 100],
  [d('┃ ') + bd('Friendly name         ') + d('┃ ') + bd('IEEE address         ') + d('┃ ') + bd('Type      ') + d('┃ ') + bd('Vendor          ') + d('┃'), 60],
  [d('┡━━━━━━━━━━━━━━━━━━━━━━━╇━━━━━━━━━━━━━━━━━━━━━━╇━━━━━━━━━━━╇━━━━━━━━━━━━━━━━━┩'), 60],
  [`│ Aqara Door Sensor     │ ${p('0x00158d0002345def')}   │ EndDevice │ Aqara           │`, 80],
  [`│ IKEA TRADFRI bulb     │ ${p('0x00158d0001234abc')}   │ Router    │ IKEA of Sweden  │`, 80],
  [`│ IKEA TRADFRI outlet   │ ${p('0x00158d0004567jkl')}   │ Router    │ IKEA of Sweden  │`, 80],
  [`│ Philips Hue Motion    │ ${p('0x00158d0003456ghi')}   │ EndDevice │ Signify         │`, 80],
  [`│ Sonoff ZBMINI         │ ${p('0x00158d0005678mno')}   │ Router    │ ITEAD           │`, 80],
  [d('└───────────────────────┴──────────────────────┴───────────┴─────────────────┘'), 80],
];

// ── DEMO: migrate ─────────────────────────────────────────────────────────────
const DEMO_MIGRATE = [
  [`<span class="ps">$</span> <span class="cmd">zigporter migrate</span>`, 0],
  [null, 400],
  // Device picker — questionary collapses selection to single line after Enter
  [`${c('?')} Select a device to migrate:  ${g('IKEA TRADFRI bulb')}                    ${d('LED1623G12')}`, 400],
  [null, 200],
  // Wizard header
  [rule('Migrating: IKEA TRADFRI bulb', 70), 300],
  [null, 100],
  [`This wizard will migrate ${bd('IKEA TRADFRI bulb')} from ZHA to Zigbee2MQTT in 7 steps (+ 1 optional):`, 200],
  [null, 100],
  [`  ${c('1')}  Remove from ZHA    ${d('Unpair the device from ZHA')} ${r('(cannot be undone)')}`, 80],
  [`  ${c('2')}  Reset device       ${d('Factory-reset to clear the old ZHA pairing')}`, 60],
  [`  ${c('3')}  Pair with Z2M      ${d('Put device in pairing mode and join Zigbee2MQTT')}`, 60],
  [`  ${c('4')}  Rename             ${d('Restore original name and area in Z2M')}`, 60],
  [`  ${c('5')}  Restore entity IDs ${d('Rename IEEE-hex entity IDs back to friendly names')}`, 60],
  [`  ${c('6')}  Review             ${d('Inspect entities and dashboard cards')}`, 60],
  [`  ${c('7')}  Validate           ${d('Confirm entities come back online')}`, 60],
  [`  ${c('8')}  Rename (optional)  ${d('Rename to a different name with full HA cascade')}`, 60],
  [null, 100],
  [d('You can abort safely at step 1. After that, the device must complete'), 150],
  [d('pairing with Z2M before it can be used again.'), 0],
  [null, 300],
  // Step 1
  [stepHead(1, 'Remove from ZHA'), 300],
  [null, 200],
  [`  Device:       ${bd('IKEA TRADFRI bulb')}`, 100],
  [`  IEEE:         ${d('0x00158d0001234abc')}`, 60],
  [`  Manufacturer: IKEA of Sweden`, 60],
  [`  Model:        LED1623G12`, 60],
  [null, 200],
  [qline('Remove "IKEA TRADFRI bulb" from ZHA?', 'Yes'), 700],
  [null, 100],
  [`Removing ${bd('IKEA TRADFRI bulb')} from ZHA...  ${ok('✓')} Removal command sent`, 800],
  [`Verifying removal...  ${ok('✓')} Device removed from ZHA`, 800],
  [null, 200],
  // Step 2
  [stepHead(2, 'Reset physical device'), 300],
  [null, 200],
  [`Factory-reset the ${bd('IKEA TRADFRI bulb')} to clear its old pairing.`, 200],
  [`  Manufacturer: IKEA of Sweden`, 80],
  [`  Model:        LED1623G12`, 60],
  [null, 100],
  [`  Model-specific reset instructions:`, 150],
  [`  ${b('https://www.zigbee2mqtt.io/devices/LED1623G12.html')}`, 60],
  [null, 100],
  [enterLine('Press Enter when the device has been reset...'), 1000],
  [null, 200],
  // Step 3
  [stepHead(3, 'Pair with Zigbee2MQTT'), 400],
  [null, 200],
  [`Enabling permit join...`, 300],
  [`${ok('✓')} Permit join enabled`, 500],
  [null, 100],
  [`Trigger ${bd('IKEA TRADFRI bulb')} to join now...`, 200],
  [`Waiting for device ${d('0x00158d0001234abc')} to appear in Z2M...`, 200],
  [null, 100],
  [`  ${d('⠸')} Listening for new device  ${d('[297s remaining]')}`, 300, 1],
  [`  ${d('⠼')} Listening for new device  ${d('[294s remaining]')}`, 900, 1],
  [`  ${d('⠴')} Listening for new device  ${d('[291s remaining]')}`, 900, 1],
  [`  ${d('⠦')} Listening for new device  ${d('[288s remaining]')}`, 700, 1],
  [null, 200, 2],
  [`${ok('✓')} Device found in Z2M: ${bd('0x00158d0001234abc')}`, 100],
  [null, 200],
  // Step 4
  [stepHead(4, 'Rename device in Z2M'), 300],
  [null, 200],
  [`  Z2M assigned:   ${d('0x00158d0001234abc')}`, 100],
  [`  Will rename to: ${bd('IKEA TRADFRI bulb')}`, 80],
  [null, 100],
  [qline('Apply rename to "IKEA TRADFRI bulb"?', 'Yes'), 700],
  [`${ok('✓')} Renamed to IKEA TRADFRI bulb`, 600],
  [`${ok('✓')} Area set to Living Room`, 400],
  [null, 200],
  // Step 5
  [stepHead(5, 'Restore entity IDs'), 300],
  [null, 200],
  [`  The following entity IDs will be updated:`, 200],
  [null, 80],
  [`  ${d('light.0x00158d0001234abc_state')}`, 200],
  [`    ${c('→')} ${bd('light.living_room_bulb')}`, 80],
  [null, 100],
  [qline('Apply entity ID renames?', 'Yes'), 700],
  [`${ok('✓')} light.0x00158d0001234abc_state ${c('→')} light.living_room_bulb`, 600],
  [null, 200],
  // Step 6
  [stepHead(6, 'Review entities & dashboards'), 300],
  [null, 200],
  [`  Entities (1):`, 200],
  [`  ${ok('✓')}  light.living_room_bulb              ${d('light')}`, 150],
  [null, 100],
  [d('  No automations or dashboard cards reference this device.'), 150],
  [null, 200],
  // Step 7
  [stepHead(7, 'Validate'), 300],
  [null, 200],
  [`Waiting for entities to come online...`, 200],
  [`  ${d('⠸')} Polling entity states  ${d('[27s remaining]')}`, 400, 1],
  [`  ${d('⠼')} Polling entity states  ${d('[24s remaining]')}`, 1000, 1],
  [`  ${d('⠴')} Polling entity states  ${d('[21s remaining]')}`, 1000, 1],
  [`  ${ok('✓')}  light.living_room_bulb              ${g('on')}`, 600, 2],
  [null, 200],
  [`${G('ok', '✓')} Migration complete! ${bd('IKEA TRADFRI bulb')} successfully migrated.`, 400],
  [`Progress: ${bd('1/1')} devices migrated.`, 100],
  [null, 300],
  [`  ${ok('✓')} Turn the device on/off and verify the state updates in HA`, 300],
  [`  ${ok('✓')} Check the device appears in the Z2M dashboard`, 80],
  [`  ${ok('✓')} Verify any automations still trigger correctly`, 80],
  [null, 300],
  // Step 8 (optional rename)
  [stepHead(8, 'Rename (optional)'), 400],
  [null, 200],
  [qline('Rename this device to a different name?', 'Yes'), 700],
  [qline('New device name:', 'Living Room Ceiling'), 700],
  [`  Fetching entities... ${g('1 found')}`, 600],
  [null, 100],
  [`\nScanning for references... ${ok('✓')}`, 600],
  [null, 100],
  [`  Device ${bd('IKEA TRADFRI bulb')}  ${d('→')}  ${c('Living Room Ceiling')}`, 200],
  [null, 100],
  [`  ${d('light.living_room_bulb')}                  ${c('→')}  ${c('light.living_room_ceiling')}`, 150],
  [null, 100],
  [`  ${d('1 entities to rename')}`, 150],
  [null, 200],
  [qline('Apply these changes?', 'Yes'), 700],
  [null, 100],
  [`  Renaming device in HA registry... ${ok('✓')}`, 500],
  [`  Renaming ${d('light.living_room_bulb')} ${c('→')} ${c('light.living_room_ceiling')}... ${ok('✓')}`, 400],
  [null, 100],
  [`${ok('✓')} Renamed device ${bd('IKEA TRADFRI bulb')} ${c('→')} ${c('Living Room Ceiling')} (${bd('1')} entities updated)`, 300],
];

// ── DEMO: rename-device ───────────────────────────────────────────────────────
const DEMO_RENAME = [
  [`<span class="ps">$</span> <span class="cmd">zigporter rename-device "IKEA TRADFRI bulb" "Living Room Light" --apply</span>`, 0],
  [null, 300],
  [`Scanning entity registry...`, 400],
  [`  ${ok('✓')}  1 entity matched: ${c('light.living_room_bulb')}`, 400],
  [null, 60],
  [`Scanning automations (3)...`, 300],
  [`  ${ok('✓')}  "Morning Routine"  ${d('2 references')}`, 300],
  [null, 60],
  [`Scanning dashboards...`, 300],
  [`  ${ok('✓')}  default dashboard  ${d('1 reference')}`, 300],
  [null, 200],
  [rule('Rename plan  IKEA TRADFRI bulb → Living Room Light', 70), 200],
  [null, 100],
  [d('┏━━━━━━━━━━━━━━┳━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┳━━━━━┓'), 100],
  [d('┃ ') + bd('Context      ') + d('┃ ') + bd('Name                                              ') + d('┃ ') + bd('N   ') + d('┃'), 60],
  [d('┡━━━━━━━━━━━━━━╇━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━╇━━━━━┩'), 60],
  [`│ registry     │ ${c('light.living_room_bulb')} ${c('→')} ${c('light.living_room_light')}  │ 1   │`, 80],
  [`│ automation   │ Morning Routine                                   │ 2   │`, 80],
  [`│ lovelace     │ default dashboard                                 │ 1   │`, 80],
  [d('└──────────────┴───────────────────────────────────────────────────┴─────┘'), 60],
  [null, 100],
  [d('Z2M device will also be renamed and the integration reloaded.'), 100],
  [null, 100],
  [qline('Apply 4 changes?', 'Yes'), 700],
  [null, 100],
  [`Updating entity registry...  ${ok('✓')}`, 500],
  [`Updating automation "Morning Routine"...  ${ok('✓')}`, 400],
  [`Updating default dashboard...  ${ok('✓')}`, 400],
  [`Renaming Z2M device "IKEA TRADFRI bulb" ${c('→')} "Living Room Light"...  ${ok('✓')}`, 500],
  [`Reloading Z2M integration...  ${ok('✓')}`, 700],
  [null, 200],
  [`${ok('✓')} Rename complete.`, 100],
];

// ── DEMO: fix-device ──────────────────────────────────────────────────────────
const DEMO_FIX = [
  [`<span class="ps">$</span> <span class="cmd">zigporter fix-device</span>`, 0],
  [`Fetching registry data from Home Assistant...  ${ok('✓')}`, 700],
  [null, 200],
  [`Found 1 device with stale ZHA entry.`, 200],
  [null, 200],
  [`  Device: ${bd('IKEA TRADFRI bulb')}  ${d('(IEEE 00158d0001234abc)')}`, 200],
  [null, 100],
  [d('   Action    Entity ID                                          '), 100],
  [d('  ─────────  ──────────────────────────────────────────────────'), 60],
  [`  ${r('delete')}     light.living_room_bulb                         `, 80],
  [`  ${c('rename')}     light.living_room_bulb_2 ${c('→')} light.living_room_bulb`, 80],
  [null, 100],
  [qline('Apply fix?', 'Yes'), 700],
  [null, 100],
  [`  ${ok('✓')} Deleted stale entity  ${d('light.living_room_bulb')}`, 400],
  [`  ${ok('✓')} Removed stale ZHA device entry  ${d('b3f2c8a1d4e5f6a7')}`, 400],
  [`  ${ok('✓')} light.living_room_bulb_2 ${c('→')} ${bd('light.living_room_bulb')}`, 500],
  [null, 200],
  [`${ok('✓')} Done.  Reload the HA page to confirm the device is clean.`, 100],
];

// ── DEMO: inspect ─────────────────────────────────────────────────────────────
const DEMO_INSPECT = [
  [`<span class="ps">$</span> <span class="cmd">zigporter inspect "IKEA TRADFRI bulb"</span>`, 0],
  [null, 300],

// ── Playback engine ───────────────────────────────────────────────────────────
let activeKey  = null;
let activeTimer= null;
let spinnerEl  = null; // current overwrite target

const tout = document.getElementById('tout');

function clearTerm() {
  tout.innerHTML = '';
  spinnerEl = null;
  if (activeTimer) { clearTimeout(activeTimer); activeTimer = null; }
}

function appendLine(html) {
  const el = document.createElement('div');
  el.innerHTML = html !== null ? html : '';
  tout.appendChild(el);
  spinnerEl = null;
  tout.scrollTop = tout.scrollHeight;
  return el;
}

function spinLine(html) {
  if (spinnerEl) {
    spinnerEl.innerHTML = html;
  } else {
    spinnerEl = document.createElement('div');
    spinnerEl.innerHTML = html;
    tout.appendChild(spinnerEl);
  }
  tout.scrollTop = tout.scrollHeight;
}

function endSpinner(html) {
  if (spinnerEl) {
    spinnerEl.innerHTML = html;
    spinnerEl = null;
  } else {
    appendLine(html);
  }
  tout.scrollTop = tout.scrollHeight;
}

function playScript(script, idx) {
  if (idx >= script.length) {
    // Done — add blinking cursor on last line, update card status
    const cur = document.createElement('span');
    cur.className = 'cur';
    tout.lastChild && tout.lastChild.appendChild && tout.lastChild.appendChild(cur);
    setCardStatus(activeKey, 'done');
    return;
  }
  const [html, delay, type] = script[idx];
  activeTimer = setTimeout(() => {
    if (type === 1) {
      spinLine(html);
    } else if (type === 2) {
      endSpinner(html);
    } else {
      appendLine(html);
    }
    playScript(script, idx + 1);
  }, delay);
}

function play(key) {
  const demo = DEMOS.find(d => d.key === key);
  if (!demo) return;
  clearTerm();
  activeKey = key;
  updateCards();
  playScript(demo.script, 0);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
const cardStatus = {};

function setCardStatus(key, status) {
  cardStatus[key] = status;
  updateCards();
}

function updateCards() {
  DEMOS.forEach(demo => {
    const el = document.getElementById('card-' + demo.key);
    if (!el) return;
    el.className = 'card' +
      (demo.key === activeKey ? ' active' : '') +
      (cardStatus[demo.key] === 'done' && demo.key !== activeKey ? ' done' : '');
    const cs = el.querySelector('.cs');
    if (cs) {
      if (demo.key === activeKey) {
        cs.textContent = '▶ playing...';
      } else if (cardStatus[demo.key] === 'done') {
        cs.textContent = '✓ done — click to replay';
      } else {
        cs.textContent = 'click to play';
      }
    }
  });
}

function buildSidebar() {
  const sb = document.getElementById('sbody');
  DEMOS.forEach(demo => {
    const card = document.createElement('div');
    card.id = 'card-' + demo.key;
    card.className = 'card';
    card.innerHTML = `
      <div class="cc"><span class="cps">$ </span>${demo.label}</div>
      <div class="cd">${demo.desc}</div>
      <div class="cs">click to play</div>`;
    card.addEventListener('click', () => play(demo.key));
    sb.appendChild(card);
  });
}

document.getElementById('breplay').addEventListener('click', () => {
  if (activeKey) play(activeKey);
});
