name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group docs

      - name: Inject version into demo playground
        run: |
          python3 -c "
          import re, tomllib
          with open('pyproject.toml', 'rb') as f:
              version = tomllib.load(f)['project']['version']
          with open('docs/demo/index.html') as f:
              html = f.read()
          html = re.sub(r'(<span id=\"vbadge\">)[^<]*(</span>)', rf'\g<1>v{version}\g<2>', html)
          with open('docs/demo/index.html', 'w') as f:
              f.write(html)
          print(f'Injected version: v{version}')
          "

      - name: Build documentation
        run: uv run zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        timeout-minutes: 5
        uses: actions/deploy-pages@v4
