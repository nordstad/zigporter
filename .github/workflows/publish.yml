name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Build package
        run: uv build

      - name: Validate package metadata
        run: uv run twine check dist/*

      - name: Smoke test from built dist
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
          /tmp/smoke-venv/bin/zigporter --version
          /tmp/smoke-venv/bin/zigporter --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*

      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = existing.data;
            } catch (e) {
              if (e.status !== 404) throw e;
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: tag.includes('-'),
              });
              release = created.data;
            }

            return {
              version: tag.replace('v', ''),
              body: release.body
            };

      - name: Update CHANGELOG.md
        env:
          RELEASE_DATA: ${{ steps.create_release.outputs.result }}
        run: |
          VERSION=$(echo "$RELEASE_DATA" | jq -r '.version')
          RELEASE_DATE=$(date +%Y-%m-%d)

          echo "$RELEASE_DATA" | jq -r '.body' > release_notes.txt

          uv run python scripts/update_changelog.py "$VERSION" release_notes.txt "$RELEASE_DATE"

          if git diff --quiet CHANGELOG.md; then
            echo "No changes to CHANGELOG.md"
          else
            echo "CHANGELOG.md updated successfully"
          fi

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet CHANGELOG.md; then
            echo "No changes to commit"
          else
            git add CHANGELOG.md
            git commit -m "Update CHANGELOG.md for release ${GITHUB_REF#refs/tags/}"
            cp CHANGELOG.md /tmp/CHANGELOG.md
            git fetch origin main
            git checkout main
            cp /tmp/CHANGELOG.md CHANGELOG.md
            git add CHANGELOG.md
            git diff --cached --quiet || git commit -m "Update CHANGELOG.md for release ${GITHUB_REF#refs/tags/}"
            git push origin main
          fi

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Get PyPI tarball sha256
        id: pypi
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DATA=$(curl -s "https://pypi.org/pypi/zigporter/${VERSION}/json")
          URL=$(echo "$DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print([f['url'] for f in d['urls'] if f['url'].endswith('.tar.gz')][0])")
          SHA=$(echo "$DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print([f['digests']['sha256'] for f in d['urls'] if f['url'].endswith('.tar.gz')][0])")
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: nordstad/homebrew-zigporter
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          URL: ${{ steps.pypi.outputs.url }}
          SHA256: ${{ steps.pypi.outputs.sha256 }}
        run: |
          sed -i "s|url \"https://files.pythonhosted.org/.*\"|url \"${URL}\"|" tap/Formula/zigporter.rb
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|" tap/Formula/zigporter.rb

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zigporter.rb
          git diff --cached --quiet || git commit -m "zigporter ${GITHUB_REF_NAME}"
          git push origin main
