name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Build package
        run: uv build

      - name: Validate package metadata
        run: uv run twine check dist/*

      - name: Smoke test from built dist
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
          /tmp/smoke-venv/bin/zigporter --version
          /tmp/smoke-venv/bin/zigporter --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*

      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = existing.data;
            } catch (e) {
              if (e.status !== 404) throw e;
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: tag.includes('-'),
              });
              release = created.data;
            }

            return {
              version: tag.replace('v', ''),
              body: release.body
            };

      - name: Update CHANGELOG.md
        env:
          RELEASE_DATA: ${{ steps.create_release.outputs.result }}
        run: |
          VERSION=$(echo "$RELEASE_DATA" | jq -r '.version')
          RELEASE_DATE=$(date +%Y-%m-%d)

          echo "$RELEASE_DATA" | jq -r '.body' > release_notes.txt

          uv run python scripts/update_changelog.py "$VERSION" release_notes.txt "$RELEASE_DATE"

          if git diff --quiet CHANGELOG.md; then
            echo "No changes to CHANGELOG.md"
          else
            echo "CHANGELOG.md updated successfully"
          fi

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet CHANGELOG.md; then
            echo "No changes to commit"
          else
            git add CHANGELOG.md
            git commit -m "Update CHANGELOG.md for release ${GITHUB_REF#refs/tags/}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
