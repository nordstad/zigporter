name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Build package
        run: uv build

      - name: Validate package metadata
        run: uv run twine check dist/*

      - name: Smoke test from built dist
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
          /tmp/smoke-venv/bin/zigporter --version
          /tmp/smoke-venv/bin/zigporter --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*

      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = existing.data;
            } catch (e) {
              if (e.status !== 404) throw e;
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: tag.includes('-'),
              });
              release = created.data;
            }

            return {
              version: tag.replace('v', ''),
              body: release.body
            };

      - name: Update CHANGELOG.md
        env:
          RELEASE_DATA: ${{ steps.create_release.outputs.result }}
        run: |
          VERSION=$(echo "$RELEASE_DATA" | jq -r '.version')
          RELEASE_DATE=$(date +%Y-%m-%d)

          echo "$RELEASE_DATA" | jq -r '.body' > release_notes.txt

          uv run python scripts/update_changelog.py "$VERSION" release_notes.txt "$RELEASE_DATE"

          if git diff --quiet CHANGELOG.md; then
            echo "No changes to CHANGELOG.md"
          else
            echo "CHANGELOG.md updated successfully"
          fi

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet CHANGELOG.md; then
            echo "No changes to commit"
          else
            git add CHANGELOG.md
            git commit -m "Update CHANGELOG.md for release ${GITHUB_REF#refs/tags/}"
            cp CHANGELOG.md /tmp/CHANGELOG.md
            git fetch origin main
            git checkout main
            cp /tmp/CHANGELOG.md CHANGELOG.md
            git add CHANGELOG.md
            git diff --cached --quiet || git commit -m "Update CHANGELOG.md for release ${GITHUB_REF#refs/tags/}"
            git push origin main
          fi

  update-homebrew:
    needs: publish
    runs-on: macos-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: nordstad/homebrew-zigporter
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update main url/sha256
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          python3 - <<'EOF'
          import json, os, re, urllib.request

          version = os.environ["VERSION"].lstrip("v")
          formula = "tap/Formula/zigporter.rb"

          data = json.loads(urllib.request.urlopen(
              f"https://pypi.org/pypi/zigporter/{version}/json"
          ).read())
          tarball = next(f for f in data["urls"] if f["url"].endswith(".tar.gz"))
          url, sha256 = tarball["url"], tarball["digests"]["sha256"]

          text = open(formula).read()
          # Patch only the top-level url/sha256 — stop before the first resource block
          first_resource = text.index("\n  resource ")
          header, rest = text[:first_resource], text[first_resource:]
          header = re.sub(r'url "https://files\.pythonhosted\.org/[^"]+"', f'url "{url}"', header)
          header = re.sub(r'sha256 "[0-9a-f]+"', f'sha256 "{sha256}"', header)
          open(formula, "w").write(header + rest)
          print(f"Updated url/sha256 for v{version}")
          EOF

      - name: Regenerate resource stanzas
        run: brew update-python-resources "$(pwd)/tap/Formula/zigporter.rb"

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zigporter.rb
          git diff --cached --quiet || git commit -m "zigporter ${GITHUB_REF_NAME}"
          git push origin main
